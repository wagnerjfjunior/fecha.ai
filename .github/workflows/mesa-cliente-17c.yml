name: MesaCliente 17C - Static Financial Panel Validation

on:
  push:
    branches:
      - feature/mesa-cliente-fase-8-front-operacoes-financeiras
    paths:
      - ".github/workflows/mesa-cliente-17c.yml"
      - "scripts/tests/mesa-cliente/17c_validacao_estatica_operacoes_financeiras_panel.mjs"
      - "src/components/MesaCliente/OperacoesFinanceirasPanel.jsx"
      - "src/components/MesaCliente/operacoes-financeiras/**"
      - "src/components/MesaCliente/hooks/useMesaData.js"
      - "src/features/mesaCliente/api/mesaClienteOperacoesFinanceirasApi.js"
      - "docs/mesa-cliente/fase-8c-contrato-operacoes-financeiras-panel.md"

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/mesa-cliente-17c.yml"
      - "scripts/tests/mesa-cliente/17c_validacao_estatica_operacoes_financeiras_panel.mjs"
      - "src/components/MesaCliente/OperacoesFinanceirasPanel.jsx"
      - "src/components/MesaCliente/operacoes-financeiras/**"
      - "src/components/MesaCliente/hooks/useMesaData.js"
      - "src/features/mesaCliente/api/mesaClienteOperacoesFinanceirasApi.js"
      - "docs/mesa-cliente/fase-8c-contrato-operacoes-financeiras-panel.md"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  mesa-cliente-17c:
    name: Run 17C static validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure origin/main reference
        run: |
          git fetch origin main:refs/remotes/origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Show execution context
        run: |
          echo "Branch:"
          git branch --show-current || true
          echo "Latest commit:"
          git log --oneline -n 5
          echo "Node:"
          node -v
          echo "Diff origin/main...HEAD:"
          git diff --name-only origin/main...HEAD || true

      - name: Run MesaCliente 17C static validation
        id: run_17c
        continue-on-error: true
        run: |
          mkdir -p tmp
          node scripts/tests/mesa-cliente/17c_validacao_estatica_operacoes_financeiras_panel.mjs | tee tmp/17c_resultado.json
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload 17C evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mesa-cliente-17c-resultado
          path: tmp/17c_resultado.json

      - name: Fail if 17C has FAIL block
        run: |
          if grep -q '"status": "FAIL"' tmp/17c_resultado.json; then
            echo "17C encontrou bloco FAIL"
            cat tmp/17c_resultado.json
            exit 1
          fi

          echo "17C sem FAIL"
