name: MesaCliente 18C - Secure Simulation Selection

on:
  push:
    branches:
      - feature/mesa-cliente-fase-8-front-operacoes-financeiras
    paths:
      - ".github/workflows/mesa-cliente-18c.yml"
      - "scripts/tests/mesa-cliente/18c_validacao_selecao_segura_simulacao_operacoes_financeiras.mjs"
      - "src/components/MesaCliente/index.jsx"
      - "src/components/MesaCliente/TabHistorico.jsx"
      - "src/components/MesaCliente/OperacoesFinanceirasPanel.jsx"
      - "docs/mesa-cliente/fase-8f-contrato-selecao-segura-simulacao-operacoes-financeiras.md"

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/mesa-cliente-18c.yml"
      - "scripts/tests/mesa-cliente/18c_validacao_selecao_segura_simulacao_operacoes_financeiras.mjs"
      - "src/components/MesaCliente/index.jsx"
      - "src/components/MesaCliente/TabHistorico.jsx"
      - "src/components/MesaCliente/OperacoesFinanceirasPanel.jsx"
      - "docs/mesa-cliente/fase-8f-contrato-selecao-segura-simulacao-operacoes-financeiras.md"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  mesa-cliente-18c:
    name: Run 18C secure simulation selection validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure origin/main reference
        run: |
          git fetch origin main:refs/remotes/origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Show execution context
        run: |
          echo "Branch:"
          git branch --show-current || true
          echo "Latest commit:"
          git log --oneline -n 8
          echo "Node:"
          node -v
          echo "Diff origin/main...HEAD:"
          git diff --name-only origin/main...HEAD || true

      - name: Run MesaCliente 18C static validation
        id: run_18c
        continue-on-error: true
        run: |
          mkdir -p tmp
          node scripts/tests/mesa-cliente/18c_validacao_selecao_segura_simulacao_operacoes_financeiras.mjs | tee tmp/18c_resultado.json
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload 18C evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mesa-cliente-18c-resultado
          path: tmp/18c_resultado.json

      - name: Fail if 18C has FAIL block
        run: |
          if grep -q '"status": "FAIL"' tmp/18c_resultado.json; then
            echo "18C encontrou bloco FAIL"
            cat tmp/18c_resultado.json
            exit 1
          fi

          echo "18C sem FAIL"
