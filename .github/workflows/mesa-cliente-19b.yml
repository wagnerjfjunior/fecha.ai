name: MesaCliente 19B - Fix Criar Mesa Corretor Audit

on:
  push:
    branches:
      - feature/mesa-cliente-fase-8-front-operacoes-financeiras
    paths:
      - ".github/workflows/mesa-cliente-19b.yml"
      - "scripts/tests/mesa-cliente/19b_validacao_estatica_fix_criar_mesa_corretor_audit.mjs"
      - "supabase/migrations/20260525152000_mesa_cliente_fase_8h_fix_criar_mesa_corretor_audit.sql"
      - "docs/mesa-cliente/fase-8h-contrato-fix-rpc-criar-mesa-corretor-audit.md"

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/mesa-cliente-19b.yml"
      - "scripts/tests/mesa-cliente/19b_validacao_estatica_fix_criar_mesa_corretor_audit.mjs"
      - "supabase/migrations/20260525152000_mesa_cliente_fase_8h_fix_criar_mesa_corretor_audit.sql"
      - "docs/mesa-cliente/fase-8h-contrato-fix-rpc-criar-mesa-corretor-audit.md"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  mesa-cliente-19b:
    name: Run 19B static validation for corretor audit fix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Show execution context
        run: |
          echo "Branch:"
          git branch --show-current || true
          echo "Latest commit:"
          git log --oneline -n 10
          echo "Node:"
          node -v

      - name: Run MesaCliente 19B static validation
        id: run_19b
        continue-on-error: true
        run: |
          mkdir -p tmp
          node scripts/tests/mesa-cliente/19b_validacao_estatica_fix_criar_mesa_corretor_audit.mjs | tee tmp/19b_resultado.json
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload 19B evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mesa-cliente-19b-resultado
          path: tmp/19b_resultado.json

      - name: Fail if 19B has FAIL block
        run: |
          if grep -q '"status": "FAIL"' tmp/19b_resultado.json; then
            echo "19B encontrou bloco FAIL"
            cat tmp/19b_resultado.json
            exit 1
          fi

          echo "19B sem FAIL"
