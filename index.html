<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FECH.AI" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>FECH.AI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      /**
       * FECH.AI PWA safety gate
       *
       * Em previews da Vercel, cada commit gera um host novo. Manter Service Worker
       * ativo nesse ambiente aumenta o risco de abrir uma tela com bundle antigo,
       * especialmente durante depuração intensa do Mesa Cliente.
       *
       * Regra:
       * - vercel.app: não registra SW e remove qualquer SW antigo daquele host.
       * - domínios finais de produção: registra normalmente.
       */
      (function () {
        if (!('serviceWorker' in navigator)) return;

        const isVercelPreview = /\.vercel\.app$/i.test(window.location.hostname);

        window.addEventListener('load', () => {
          if (isVercelPreview) {
            navigator.serviceWorker.getRegistrations()
              .then(registrations => Promise.all(registrations.map(r => r.unregister())))
              .then(() => console.log('[FECH.AI] SW desativado em preview Vercel'))
              .catch(e => console.log('[FECH.AI] Falha ao limpar SW em preview:', e));
            return;
          }

          navigator.serviceWorker.register('/sw.js')
            .then(r => console.log('SW registrado:', r.scope))
            .catch(e => console.log('SW erro:', e));
        });
      })();
    </script>
  </body>
</html>
